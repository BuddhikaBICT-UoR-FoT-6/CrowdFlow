<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([7.8731, 80.7718], 8);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    let lastMarker = null;
    function setLocation(lat, lon, label) {
      if (lastMarker) map.removeLayer(lastMarker);
      lastMarker = L.marker([lat, lon]).addTo(map).bindPopup(label || 'Location').openPopup();
      map.setView([lat, lon], 14);
    }

    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lon = e.latlng.lng;
      try {
        if (window.AndroidBridge && window.AndroidBridge.onMapTap) {
          window.AndroidBridge.onMapTap(lat, lon);
        }
      } catch (err) {
        console.error('Bridge call failed', err);
      }
    });

    // Expose a safe wrapper for WebView.evaluateJavascript
    window.setLocation = function(lat, lon, label) {
      setLocation(lat, lon, label);
    }
  </script>
</body>
</html>
